<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>ws-finance-reports — Query QuickBooks Reports</title>
  <style>
    body { font-family: system-ui, -apple-system, Roboto, Helvetica, Arial, sans-serif; padding: 24px; }
    label { display:block; margin-top:12px; font-weight:600 }
    input, select, textarea { width:100%; padding:8px; box-sizing:border-box; margin-top:6px }
    button { margin-top:12px; padding:8px 12px }
    pre { background:#0f172a; color:#e6eef8; padding:12px; overflow:auto; max-height:420px }
    .row{display:flex;gap:12px}
    .col{flex:1}
    .small{width:160px}
  </style>
</head>
<body>
  <h1>ws-finance-reports — Query Reports API</h1>
  <p>Use this UI to call the server's <code>/reports/general-ledger</code> proxy and inspect results.</p>

  <form id="qform">
    <div class="row">
      <div class="col">
        <label>Start date</label>
        <input id="start_date" type="date" value="2021-07-01" />
      </div>
      <div class="col">
        <label>End date</label>
        <input id="end_date" type="date" value="2025-06-30" />
      </div>
      <div class="small">
        <label>Minor version</label>
        <input id="minorversion" type="number" value="69" />
      </div>
    </div>

    <label>Account types (comma-separated)</label>
    <input id="account_type" type="text" value="Expense,Income,OtherIncome,OtherExpense" />

    <label>Columns (comma-separated)</label>
    <input id="columns" type="text" value="tx_date,debt_amt,credit_amt,klass_name,account_name,account_num,name,memo" />

    <div style="display:flex;gap:12px;align-items:center">
      <button id="run">Run Query</button>
      <button id="downloadJson" type="button">Download JSON</button>
      <button id="clear" type="button">Clear</button>
      <div id="status" style="margin-left:12px;color:#374151"></div>
    </div>
  </form>

  <h3>Result</h3>
  <pre id="output">No result yet.</pre>

  <script src="/app.js"></script>
</body>
</html>
